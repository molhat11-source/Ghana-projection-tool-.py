name: Build Android APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/actions-setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libffi-dev \
          libssl-dev dkms xclip libsdl2-dev libsdl2-image-dev \
          libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev \
          gettext python3-setuptools python3-dev autoconf \
          automake libtool pkg-config zlib1g-dev \
          openjdk-17-jdk unzip zip

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install Cython==0.29.33 buildozer setuptools

    - name: Run Buildozer
      run: |
        buildozer android debug
      env:
        # Bypasses the SDK/NDK licensing prompt freeze
        APP_ANDROID_ACCEPT_SDK_LICENSE: "True"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: ./**/*.apk
        
