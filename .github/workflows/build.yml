name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y zlib1g-dev python3-pip openjdk-17-jdk aidl
        pip install buildozer cython
    - name: Accept Android licenses
      run: |
        mkdir -p ~/.android
        echo "count=0" > ~/.android/repositories.cfg
        yes | sdkmanager --licenses || true
        yes | sdkmanager "build-tools;33.0.0" "platforms;android-33" || true
    - name: Build APK
      run: |
        buildozer init
        sed -i 's/title = My Application/title = Ghana Projection Tool/' buildozer.spec
        sed -i 's/package.name = myapp/package.name = ghanaapp/' buildozer.spec
        sed -i 's/package.domain = org.test/package.domain = org.knust/' buildozer.spec
        buildozer android debug
    - uses: actions/upload-artifact@v4
      with:
        name: GhanaProjectionTool
        path: bin/*.apk
